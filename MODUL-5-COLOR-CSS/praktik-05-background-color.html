<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background color</title>
    <style>
        .bgcolor{
            background-color: yellow;
            padding: 20px;
            margin: 10px;
        }
        .bgcolor-rgb{
            background-color: rgb(0, 128, 0);
        }
        .bgcolor-rgba{
            background-color: rgba(255,0,0, 0.5);
        }
    </style>
</head>
<body>
    <div class="bgcolor">Warna Latar belakang</div>
    <div class="bgcolor-rgb">Warna latar belakang dengan RGB</div>
    <div class="bgcolor-rgba">Warna latar belakang dengan rgba</div>
</body>
</html>
