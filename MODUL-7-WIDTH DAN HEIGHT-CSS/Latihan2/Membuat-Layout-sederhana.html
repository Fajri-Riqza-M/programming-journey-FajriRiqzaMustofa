<!DOCTYPE html>
<html>
<head>
    <title>Layout Sederhana</title>
    <style>
        * {
            margin: 0;
        }
        header {
            height: 100px;
            width: 100%;
            background-color: aqua;
        }
        .content {
            width: 100%;
            height: 300px;
            border: 1px solid black;
            background-color: blue;
        }
        footer {
            height: 80px;
            width: 100%;
            border: 1px solid black;
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <header>Header</header>
    <div class="container">
        <div class="content">Content</div>
    </div>
    <footer>Footer</footer>
</body>
</html>
