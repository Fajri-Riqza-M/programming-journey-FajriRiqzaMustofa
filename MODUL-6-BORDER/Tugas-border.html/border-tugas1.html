<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Border</title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
        }
        .dotted {
            border: 3px dotted red;
            padding: 10px;
        }
        .double {
            border: 5px double green;
            padding: 10px;
        }
        .dashed{
            border: 3px dashed red;
            padding: 1px;
        }
        .groove{
            border: 6px groove purple;
            padding:10px;
        }
        .ridge{
            border: 6px ridge red;
            padding:10px ;
        }
    </style>
</head>
<body>
    <h2>Contoh Border CSS</h2>

    <p class="solid" style="background-color: red;">Ini border solid</p>
    <p class="dotted" style="background-color: blue;">Ini border dotted</p>
    <p class="double" style="background-color: rgb(110, 110, 229);">Ini border double</p>
    <div class="dashed"  style="background-color: rgb(0, 255, 4);">Ini border dashed</div>
    <div class="groove"  style="background-color: rgb(255, 0, 0);">Ini border Groove</div>
    <div class="ridge"  style="background-color: rgb(200, 255, 0);">Ini border ridge</div>
</body>
</html>
